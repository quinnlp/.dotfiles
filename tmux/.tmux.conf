# https://github.com/tmux-plugins/tpm?tab=readme-ov-file#installation
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"

# https://github.com/egel/tmux-gruvbox?tab=readme-ov-file#install-via-tpm-recommended
set -g @plugin "egel/tmux-gruvbox"

# Set theme to light if it is not explicitly set.
if -F "#{==:#{@tmux-gruvbox},}" 'set -g @tmux-gruvbox "light"'

# Toggle between light and dark themes.
bind-key g run-shell " \
    if [ \"$(tmux show-option -gqv @tmux-gruvbox)\" = \"light\" ]; then \
        tmux set-option -g @tmux-gruvbox dark; \
    else \
        tmux set-option -g @tmux-gruvbox light; \
    fi; \
    tmux source-file ~/.tmux.conf; \
"

# Enable true color for xterm-256color terminals.
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Enable vi-style pane navigation.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

run "~/.tmux/plugins/tpm/tpm"
